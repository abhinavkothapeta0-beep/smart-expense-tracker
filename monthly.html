<!DOCTYPE html>
<html>
<head>
    <title>Monthly Analytics</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <h2 class="text-center mb-4">📈 Monthly Expense Analytics</h2>
        <a href="/" class="btn btn-secondary mb-4">← Back</a>
        
        {% if months %}
        <div style="position: relative; height:400px;">
            <canvas id="chart"></canvas>
        </div>
        
        <div class="row mt-4">
            <div class="col-md-8 mx-auto">
                <table class="table table-striped">
                    <thead class="table-primary">
                        <tr><th>Month</th><th>Total</th></tr>
                    </thead>
                    <tbody>
                        {% for i in range(months|length) %}
                        <tr><td>{{ months[i] }}</td><td>₹{{ totals[i] | round(2) }}</td></tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>
        {% else %}
        <div class="alert alert-warning text-center">
            No monthly data available. Add expenses with dates first!
        </div>
        {% endif %}
    </div>

    <script>
        const ctx = document.getElementById('chart')?.getContext('2d');
        if (ctx) {
            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: {{ months|tojson | safe }},
                    datasets: [{
                        label: 'Monthly Expenses',
                        data: {{ totals|tojson }},
                        borderColor: '#007bff',
                        backgroundColor: 'rgba(0,123,255,0.1)',
                        borderWidth: 3,
                        fill: true,
                        tension: 0.4
                    }]
                },
                options: {
                    responsive: true,
                    scales: { y: { beginAtZero: true } }
                }
            });
        }
    </script>
</body>
</html>

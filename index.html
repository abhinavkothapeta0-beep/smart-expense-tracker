<!DOCTYPE html>
<html>
<head>

<title>Smart Expense Tracker</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family: Arial;
text-align:center;
background:#f5f5f5;
}

.container{
width:600px;
margin:auto;
background:white;
padding:20px;
border-radius:10px;
}

input,select{
padding:8px;
margin:5px;
}

button{
padding:10px;
background:#4CAF50;
color:white;
border:none;
cursor:pointer;
}

table{
width:100%;
margin-top:20px;
border-collapse:collapse;
}

th,td{
border:1px solid #ddd;
padding:8px;
}

</style>

</head>

<body>

<div class="container">

<h2>Smart Expense Tracker</h2>

<form method="POST">

<input type="date" name="date" required>

<select name="category">
<option>Food</option>
<option>Travel</option>
<option>Shopping</option>
<option>Bills</option>
<option>Other</option>
</select>

<input type="number" name="amount" placeholder="Amount" required>

<input type="text" name="desc" placeholder="Description">

<button type="submit">Add Expense</button>

</form>

<h3>Expenses</h3>

<table>

<tr>
<th>ID</th>
<th>Date</th>
<th>Category</th>
<th>Amount</th>
<th>Description</th>
</tr>

{% for e in expenses %}

<tr>
<td>{{e[0]}}</td>
<td>{{e[1]}}</td>
<td>{{e[2]}}</td>
<td>{{e[3]}}</td>
<td>{{e[4]}}</td>
</tr>

{% endfor %}

</table>

<h3>Expense Pie Chart</h3>

<canvas id="chart"></canvas>

<script>

var ctx=document.getElementById("chart");

new Chart(ctx,{
type:'pie',

data:{
labels: {{categories | safe}},
datasets:[{
data: {{amounts | safe}},
backgroundColor:[
'red','blue','green','orange','purple'
]
}]
}
});

</script>

</div>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <title>Expense Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
    <h1 class="text-center mb-4">💰 Smart Expense Tracker</h1>
    
    <div class="card shadow p-4 mb-4">
        <h5>Add Expense</h5>
        <form method="POST">
            <div class="row g-3">
                <div class="col-md-3">
                    <select name="category" class="form-select" required>
                        <option value="" disabled selected>Category</option>
                        <option>Food</option><option>Travel</option><option>Shopping</option>
                        <option>Bills</option><option>Entertainment</option><option>Other</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <input type="number" name="amount" class="form-control" placeholder="Amount" step="0.01" min="0" required>
                </div>
                <div class="col-md-3">
                    <input type="date" name="date" class="form-control" value="{{ today }}" required>
                </div>
                <div class="col-md-3">
                    <button type="submit" class="btn btn-primary w-100">Add</button>
                </div>
            </div>
        </form>
    </div>

    {% if data %}
    <div class="table-responsive">
        <table class="table table-striped">
            <thead class="table-dark">
                <tr><th>ID</th><th>Category</th><th>Amount</th><th>Date</th></tr>
            </thead>
            <tbody>
                {% for row in data %}
                <tr>
                    <td>{{ row[0] }}</td>
                    <td class="fw-bold">{{ row[1] }}</td>
                    <td class="text-success fw-bold">₹{{ "%.2f"|format(row[2]|float) }}</td>
                    <td>{{ row[3] }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
    {% else %}
    <div class="alert alert-info text-center">
        <h4>No expenses yet!</h4>
        <p>Add your first expense above.</p>
    </div>
    {% endif %}

    <div class="text-center mt-4">
        <a href="/chart" class="btn btn-success btn-lg me-2">📊 Charts</a>
        <a href="/monthly" class="btn btn-warning btn-lg me-2">📈 Monthly</a>
        <a href="/insights" class="btn btn-info btn-lg me-2">💡 Insights</a>
        <a href="/download" class="btn btn-secondary btn-lg">📥 CSV Report</a>
    </div>
</div>
</body>
</html>

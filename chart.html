<!DOCTYPE html>
<html>
<head>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
    <h1 class="text-center mb-4">📊 Category Chart</h1>
    <a href="/" class="btn btn-secondary mb-4">← Back</a>
    
    {% if categories %}
    <div style="position:relative; height:400px;">
        <canvas id="chart"></canvas>
    </div>
    <table class="table mt-4">
        <thead class="table-primary"><tr><th>Category</th><th>Total</th></tr></thead>
        <tbody>
            {% for i in range(categories|length) %}
            <tr><td>{{ categories[i] }}</td><td>₹{{ "%.2f"|format(amounts[i]) }}</td></tr>
            {% endfor %}
        </tbody>
    </table>
    {% else %}
    <div class="alert alert-warning text-center">No data for charts yet!</div>
    {% endif %}
</div>

{% if categories %}
<script>
new Chart(document.getElementById('chart').getContext('2d'), {
    type: 'pie',
    data: {
        labels: {{ categories|tojson }},
        datasets: [{data: {{ amounts|tojson }}, backgroundColor: ['#FF6384','#36A2EB','#FFCE56','#4BC0C0','#9966FF']}]
    }
});
</script>
{% endif %}
</body>
</html>
